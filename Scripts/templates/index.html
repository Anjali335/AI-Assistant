<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DBGI College Assistant — AI-Powered Campus Helper</title>
  <meta name="description"
    content="Ask anything about DBGI Saharanpur — placements, exams, notices, admissions, and more. Powered by AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css?v=3" />
</head>

<body>

  <!-- Animated background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🎓</div>
        <div class="logo-text">
          <span class="logo-title">DBGI</span>
          <span class="logo-sub">Assistant</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <p class="nav-label">Quick Topics</p>
        <button class="nav-chip" data-query="latest placement drives" id="chip-placement">
          <span class="chip-icon">💼</span> Placements
        </button>
        <button class="nav-chip" data-query="AKTU exam schedule" id="chip-aktu">
          <span class="chip-icon">📋</span> AKTU Exams
        </button>
        <button class="nav-chip" data-query="BTEUP notices" id="chip-bteup">
          <span class="chip-icon">📄</span> BTEUP
        </button>
        <button class="nav-chip" data-query="MSU exam results" id="chip-msu">
          <span class="chip-icon">🏛️</span> MSU
        </button>
        <button class="nav-chip" data-query="admission process and requirements" id="chip-admission">
          <span class="chip-icon">🎯</span> Admissions
        </button>
        <button class="nav-chip" data-query="campus events and news" id="chip-events">
          <span class="chip-icon">📅</span> Campus Events
        </button>
      </nav>

      <div class="sidebar-themes">
        <p class="nav-label">Theme Palette</p>
        <div class="theme-preset-row">
          <button class="theme-preset-btn active" data-preset="indigo" title="Aurora Indigo" aria-label="Indigo theme">
            <span class="preset-color color-indigo"></span>
          </button>
          <button class="theme-preset-btn" data-preset="emerald" title="Emerald Mint" aria-label="Emerald theme">
            <span class="preset-color color-emerald"></span>
          </button>
          <button class="theme-preset-btn" data-preset="sunset" title="Velvet Sunset" aria-label="Sunset theme">
            <span class="preset-color color-sunset"></span>
          </button>
        </div>
      </div>


      <div class="sidebar-status">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Connecting...</span>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-area">

      <!-- Header -->
      <header class="chat-header">
        <button class="menu-btn" id="menu-btn" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>

        <div class="header-badge">
          <img src="/static/image.png" alt="DBGI Logo" class="header-video" />
        </div>

        <div class="header-info">
          <div class="header-title-row">
            <h1 class="header-title">DBGI College Assistant</h1>
            <span class="app-version">v3</span>
          </div>
          <p class="header-sub">AI-Powered · Always Here to Help</p>
        </div>

        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode" title="Toggle Theme">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        <button class="clear-btn" id="clear-chat" aria-label="Clear Chat History" title="Clear Chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />
          </svg>
        </button>
      </header>

      <!-- Messages -->
      <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
        <!-- Messages injected by JS -->
      </div>

      <!-- Floating Scroll Button -->
      <button class="scroll-bottom-btn" id="scroll-bottom-btn" aria-label="Scroll to bottom" title="Scroll to bottom">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>

      <!-- Input bar -->
      <div class="input-bar">
        <div class="input-wrapper">
          <textarea id="msg-input" class="msg-input" placeholder="Ask about placements, exams, notices, admissions..."
            rows="1" aria-label="Type your message" autocomplete="off"></textarea>
          <div class="input-actions">
            <button class="stop-btn" id="stop-btn" aria-label="Stop response" title="Stop response" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="6" y="6" width="12" height="12" rx="2" />
              </svg>
            </button>
            <button class="send-btn" id="send-btn" aria-label="Send message" title="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script src="/static/app.js?v=3"></script>
</body>

</html>
